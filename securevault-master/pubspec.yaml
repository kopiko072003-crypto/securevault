name: securevault
description: "SecureVault Identity System - Mobile Secure Design Patterns & MVVM"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.0
  
  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  
  # Google Sign-In
  google_sign_in: ^7.2.0
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # Biometric Authentication
  local_auth: ^2.1.0
  local_auth_ios: ^1.1.1
  
  # UI & Icons
  cupertino_icons: ^1.0.2
  fluttertoast: ^8.2.0
  
  # Form Validation
  email_validator: ^2.1.17
  get: ^4.7.3
  flutter_facebook_auth: ^7.1.5
  encrypt: ^5.0.3
  crypto: ^3.0.3
  simple_icons: ^14.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
